name: CI

# PR·main 푸시마다 Release 빌드 + 테스트로 빠른 피드백.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    name: Build & Test (Release)
    runs-on: windows-latest   # LocalDB·SSDT(.sqlproj) 빌드가 dev와 동일하게 동작하도록 Windows
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: Source/PlayGround/PlayGround.Client/package-lock.json

      - name: Restore
        run: dotnet restore PlayGround.slnx

      # Tailwind 산출물(app.css)을 소스 마크업 기준으로 새로 생성 — 설정 오류도 CI에서 잡힌다
      - name: Build Tailwind CSS
        working-directory: Source/PlayGround/PlayGround.Client
        run: |
          npm ci
          npm run css:build

      - name: Build (Release)
        run: dotnet build PlayGround.slnx -c Release --no-restore

      # 테스트는 CI-safe (외부 DB 불필요 — 인메모리 설정·모킹·인프로세스 ActorSystem)
      - name: Test
        run: dotnet test PlayGround.slnx -c Release --no-build --verbosity normal

name: CI

# PR·main 푸시마다 Release 빌드 + 테스트로 빠른 피드백.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    name: Build & Test (Release)
    runs-on: windows-latest   # LocalDB·SSDT(.sqlproj) 빌드가 dev와 동일하게 동작하도록 Windows
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: Source/PlayGround/PlayGround.Client/package-lock.json

      # Tailwind 산출물(app.css)을 소스 마크업 기준으로 새로 생성 — 설정 오류도 CI에서 잡힌다
      - name: Build Tailwind CSS
        working-directory: Source/PlayGround/PlayGround.Client
        run: |
          npm ci
          npm run css:build

      # SQL 프로젝트(.sqlproj)는 VS 전용 레거시 SSDT라 dotnet CLI로 빌드 불가 → 솔루션 대신 앱 프로젝트만.
      # Server가 전 앱 라이브러리 + WASM Client를 전이 참조하므로 이 하나로 앱 전체를 커버한다.
      - name: Build (Release)
        run: dotnet build Source/PlayGround/PlayGround.Server/PlayGround.Server.csproj -c Release

      # 테스트는 CI-safe (외부 DB 불필요 — 인메모리 설정·모킹·인프로세스 ActorSystem)
      - name: Test
        run: |
          dotnet test Tests/Tests.Unit/Tests.Unit.csproj -c Release --verbosity normal
          dotnet test Tests/Tests.Integration/Tests.Integration.csproj -c Release --verbosity normal
          dotnet test Tests/Tests.Infrastructure/Tests.Infrastructure.csproj -c Release --verbosity normal
